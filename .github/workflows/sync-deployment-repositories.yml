name: Sync deployment repositories

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source revision to materialize; main targets require a full 40-character SHA reachable from canonical main
        required: true
        type: string
      target_branch:
        description: Branch to update in each deployment repository
        required: true
        default: main
        type: string
      sync_web:
        description: Generate and sync the Web deployment repository
        required: true
        default: true
        type: boolean
      sync_backend:
        description: Generate and sync the backend deployment repository
        required: true
        default: true
        type: boolean
      dry_run:
        description: Build, validate, clone, and commit locally without pushing
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deployment-repository-sync-${{ inputs.target_branch }}
  cancel-in-progress: false

jobs:
  sync:
    name: Generate and sync deployment sources
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    env:
      SOURCE_REF: ${{ inputs.source_ref }}
      TARGET_BRANCH: ${{ inputs.target_branch }}
      SYNC_WEB: ${{ inputs.sync_web }}
      SYNC_BACKEND: ${{ inputs.sync_backend }}
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Check out canonical repository
        uses: actions/checkout@v4
        with:
          # Execute split tooling from the reviewed workflow revision. The
          # requested source is read as Git objects and is never executed.
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize runner paths
        shell: bash
        run: |
          set -euo pipefail
          echo "SPLIT_ROOT=${RUNNER_TEMP}/careersignals-deployment-split" >> "$GITHUB_ENV"

      - name: Resolve and authorize source revision
        id: source
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${SYNC_WEB}" != "true" && "${SYNC_BACKEND}" != "true" ]]; then
            echo "At least one deployment target must be selected." >&2
            exit 1
          fi
          if [[ -z "${SOURCE_REF}" || "${SOURCE_REF}" == -* || "${SOURCE_REF}" =~ [[:space:]] ]]; then
            echo "source_ref is not a safe Git revision." >&2
            exit 1
          fi
          if [[ -z "${TARGET_BRANCH}" || "${TARGET_BRANCH}" == -* ]]; then
            echo "target_branch is not a safe branch name." >&2
            exit 1
          fi
          git check-ref-format --branch "${TARGET_BRANCH}" >/dev/null

          if [[ "${TARGET_BRANCH}" == "main" && ! "${SOURCE_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Deployment main requires source_ref to be an explicit full 40-character canonical commit SHA." >&2
            exit 1
          fi

          git fetch --no-tags origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/dev:refs/remotes/origin/dev'
          workflow_sha="$(git rev-parse --verify HEAD)"
          if [[ "$workflow_sha" != "$GITHUB_SHA" ]]; then
            echo "Checked-out sync tooling does not match the dispatched workflow revision." >&2
            exit 1
          fi
          source_revision="${SOURCE_REF}"
          if ! git rev-parse --verify --quiet --end-of-options \
            "${source_revision}^{commit}" >/dev/null; then
            if git check-ref-format --branch "${SOURCE_REF}" >/dev/null 2>&1 && \
              git rev-parse --verify --quiet --end-of-options \
                "origin/${SOURCE_REF}^{commit}" >/dev/null; then
              source_revision="origin/${SOURCE_REF}"
            else
              echo "source_ref does not identify a fetched canonical revision." >&2
              exit 1
            fi
          fi
          source_sha="$(git rev-parse --verify --end-of-options "${source_revision}^{commit}")"
          if [[ ! "${source_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_ref did not resolve to a full commit SHA." >&2
            exit 1
          fi

          if [[ "${TARGET_BRANCH}" == "main" ]]; then
            if [[ "$GITHUB_REF" != "refs/heads/main" ]] || \
              ! git merge-base --is-ancestor "$workflow_sha" origin/main; then
              echo "Deployment main sync must execute reviewed tooling from canonical main." >&2
              exit 1
            fi
            if [[ "${source_sha}" != "${SOURCE_REF}" ]]; then
              echo "Deployment main requires source_ref to identify the resolved commit exactly." >&2
              exit 1
            fi
            if ! git merge-base --is-ancestor "${source_sha}" origin/main; then
              echo "Deployment main may only be synced from a commit reachable from canonical origin/main." >&2
              exit 1
            fi
          fi

          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"
          {
            echo "Source revision: ${source_sha}"
            echo "Target branch: ${TARGET_BRANCH}"
            echo "Dry run: ${DRY_RUN}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate canonical sync trigger
        shell: bash
        run: |
          set -euo pipefail
          python scripts/deployment_split.py validate-workflow \
            .github/workflows/sync-deployment-repositories.yml

      - name: Validate GitHub Actions workflows
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o "${RUNNER_TEMP}/actionlint.tar.gz"
          tar -xzf "${RUNNER_TEMP}/actionlint.tar.gz" -C "${RUNNER_TEMP}" actionlint
          "${RUNNER_TEMP}/actionlint" \
            .github/workflows/*.yml \
            deployment/web/.github/workflows/*.yml \
            deployment/backend/.github/workflows/*.yml

      - name: Build and validate deterministic split trees
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail
          rm -rf "${SPLIT_ROOT}"
          mkdir -p "${SPLIT_ROOT}"

          build_target() {
            local target="$1"
            local first="${SPLIT_ROOT}/${target}"
            local second="${SPLIT_ROOT}/${target}-determinism-check"

            python scripts/deployment_split.py build \
              --repo-root . \
              --source-ref "${SOURCE_SHA}" \
              --target "${target}" \
              --output "${first}"
            python scripts/deployment_split.py build \
              --repo-root . \
              --source-ref "${SOURCE_SHA}" \
              --target "${target}" \
              --output "${second}"
            python scripts/deployment_split.py compare --left "${first}" --right "${second}"
            python scripts/deployment_split.py validate \
              --root "${first}" \
              --target "${target}" \
              --expected-source-sha "${SOURCE_SHA}"
            python scripts/deployment_split.py manifest-summary --root "${first}" \
              >> "${GITHUB_STEP_SUMMARY}"
            rm -rf "${second}"
          }

          if [[ "${SYNC_WEB}" == "true" ]]; then
            build_target web
          fi
          if [[ "${SYNC_BACKEND}" == "true" ]]; then
            build_target backend
          fi

      - name: Clone and synchronize deployment repositories
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          DEPLOY_REPOSITORIES_TOKEN: ${{ secrets.DEPLOY_REPOSITORIES_TOKEN }}
          WEB_DEPLOY_REPOSITORY: https://github.com/swiftaihub/careersignals-web-deploy.git
          BACKEND_DEPLOY_REPOSITORY: https://github.com/swiftaihub/careersignals-backend-deploy.git
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_REPOSITORIES_TOKEN:-}" ]]; then
            echo "DEPLOY_REPOSITORIES_TOKEN is required to access the private deployment repositories." >&2
            exit 1
          fi

          askpass="${RUNNER_TEMP}/careersignals-git-askpass.sh"
          cat > "${askpass}" <<'ASKPASS'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) printf '%s\n' "$DEPLOY_REPOSITORIES_TOKEN" ;;
            *) exit 1 ;;
          esac
          ASKPASS
          chmod 700 "${askpass}"
          export GIT_ASKPASS="${askpass}"
          export GIT_TERMINAL_PROMPT=0
          trap 'rm -f "${GIT_ASKPASS}"' EXIT

          sync_target() {
            local target="$1"
            local remote_url="$2"
            local generated="${SPLIT_ROOT}/${target}"
            local clone_dir="${RUNNER_TEMP}/careersignals-${target}-deploy-clone"

            case "${clone_dir}" in
              "${RUNNER_TEMP}"/*) ;;
              *) echo "Refusing unsafe temporary clone path." >&2; exit 1 ;;
            esac
            rm -rf "${clone_dir}"
            git clone --no-tags "${remote_url}" "${clone_dir}"

            if git -C "${clone_dir}" ls-remote --exit-code --heads origin \
              "refs/heads/${TARGET_BRANCH}" >/dev/null 2>&1; then
              git -C "${clone_dir}" checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
            else
              current_branch="$(git -C "${clone_dir}" symbolic-ref --quiet --short HEAD || true)"
              if [[ "${current_branch}" != "${TARGET_BRANCH}" ]]; then
                git -C "${clone_dir}" checkout --orphan "${TARGET_BRANCH}"
              fi
            fi

            git -C "${clone_dir}" rm -rf --ignore-unmatch . >/dev/null 2>&1 || true
            find "${clone_dir}" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
            cp -a "${generated}/." "${clone_dir}/"

            git -C "${clone_dir}" add -A
            git -C "${clone_dir}" diff --cached --check
            if git -C "${clone_dir}" diff --cached --quiet; then
              echo "${target}: generated tree already matches ${TARGET_BRANCH}." \
                >> "${GITHUB_STEP_SUMMARY}"
              return
            fi

            git -C "${clone_dir}" diff --cached --stat
            git -C "${clone_dir}" config user.name "CareerSignals deployment sync"
            git -C "${clone_dir}" config user.email "actions@users.noreply.github.com"
            git -C "${clone_dir}" commit -m \
              "chore(deploy): sync ${target} from ${SOURCE_SHA}"

            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "${target}: dry run completed; no push performed." \
                >> "${GITHUB_STEP_SUMMARY}"
            else
              git -C "${clone_dir}" push origin "HEAD:refs/heads/${TARGET_BRANCH}"
              echo "${target}: pushed ${TARGET_BRANCH} from ${SOURCE_SHA}." \
                >> "${GITHUB_STEP_SUMMARY}"
            fi
          }

          if [[ "${SYNC_WEB}" == "true" ]]; then
            sync_target web "${WEB_DEPLOY_REPOSITORY}"
          fi
          if [[ "${SYNC_BACKEND}" == "true" ]]; then
            sync_target backend "${BACKEND_DEPLOY_REPOSITORY}"
          fi
