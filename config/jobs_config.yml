  title_match: 0.25
  required_skill_match: 0.25
  industry_match: 0.20
  salary_match: 0.10
  work_arrangement_match: 0.10
  visa_signal_match: 0.10

output:
  excel_file: "outputs/job_search_tracker.xlsx"
  top_match_threshold: 80
