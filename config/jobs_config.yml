global_filters:
  country: "US"
  locations:
    - "Remote"
    - "New York, NY"
    - "Wilmington, DE"
    - "Philadelphia, PA"
  work_type:
    - "remote"
    - "hybrid"
  employment_type:
    - "full-time"

freshness_filter:
  enabled: true
  max_post_age_hours: 24
  include_unknown_dates: false

job_categories:
  - category_name: "Data Scientist - Tech"
    search_titles:
      - "Data Scientist"
      - "Product Data Scientist"
      - "Machine Learning Data Scientist"
    industries:
      - "technology"
      - "software"
      - "AI"
      - "SaaS"
    seniority:
      - "Mid-level"
      - "Senior"

  - category_name: "Data Scientist - Healthcare"
