name: careersignal_dbt
version: "1.0.0"
config-version: 2

profile: careersignal_dbt

# Empty parse-time defaults let shared-only commands parse the whole project.
# Every user model calls require_user_context(), which rejects these defaults
# whenever a user run/build/test is actually selected.
vars:
  user_uuid: ""
  run_uuid: ""

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

models:
  careersignal_dbt:
    +materialized: incremental
    +incremental_strategy: delete+insert
    +on_schema_change: sync_all_columns
    +persist_docs:
      relation: true
      columns: true
    staging:
      +schema: staging
    intermediate:
      +schema: intermediate
    marts:
      +schema: mart
