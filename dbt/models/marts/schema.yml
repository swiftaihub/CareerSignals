version: 2

models:
  - name: mart_shared_canonical_jobs
    description: Candidate-independent canonical shared jobs.
    columns:
      - name: job_id
        data_tests: [not_null, unique]
      - name: connector_run_uuid
        data_tests: [not_null]
      - name: title
        data_tests: [not_null]

  - name: mart_shared_source_freshness
    columns:
      - name: source
        data_tests: [not_null, unique]

  - name: mart_jobs_scored
    description: Immutable user/run scored job partition.
    columns:
      - name: user_uuid
        data_tests: [not_null]
      - name: run_uuid
        data_tests: [not_null]
      - name: job_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('mart_shared_canonical_jobs')
                field: job_id
      - name: job_title
        data_tests: [not_null]
      - name: match_score
        data_tests: [not_null]
      - name: title_score
        data_tests: [not_null]
      - name: required_skill_score
        data_tests: [not_null]
      - name: industry_score
        data_tests: [not_null]
      - name: salary_score
        data_tests: [not_null]
      - name: work_arrangement_score
        data_tests: [not_null]
      - name: visa_score
        data_tests: [not_null]
      - name: match_tier
        data_tests:
          - accepted_values:
              arguments:
                values: ["Excellent Match", "Strong Match", "Good Match", "Possible Match", "Low Priority"]
      - name: visa_signal
        data_tests:
          - accepted_values:
              arguments:
                values: ["Positive", "Negative", "Unknown"]
      - name: application_status
        data_tests:
          - accepted_values:
              arguments:
                values: ["Not Applied", "Saved", "Applied", "Interview", "Rejected", "Offer", "Archived"]

  - name: mart_top_matches
    columns:
      - name: user_uuid
        data_tests: [not_null]
      - name: run_uuid
        data_tests: [not_null]
      - name: job_id
        data_tests: [not_null]

  - name: mart_category_summary
    columns:
      - name: user_uuid
        data_tests: [not_null]
      - name: run_uuid
        data_tests: [not_null]
      - name: category_name
        data_tests: [not_null]

  - name: mart_skill_gap_analysis
    columns:
      - name: user_uuid
        data_tests: [not_null]
      - name: run_uuid
        data_tests: [not_null]
      - name: skill
        data_tests: [not_null]

  - name: mart_company_priority_list
    columns:
      - name: user_uuid
        data_tests: [not_null]
      - name: run_uuid
        data_tests: [not_null]
      - name: company
        data_tests: [not_null]
