name: careersignals

x-python-service: &python-service
  image: python:3.12-slim
  working_dir: /workspace
  init: true
  env_file:
    - .env
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"
  volumes:
    - .:/workspace
    - python_cache:/root/.cache/pip
  restart: unless-stopped

services:
  api:
    <<: *python-service
    command: >-
      sh -c "python -m pip install --disable-pip-version-check -r requirements.txt &&
      uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  worker:
    <<: *python-service
    command: >-
      sh -c "python -m pip install --disable-pip-version-check -r requirements.txt &&
      python -m apps.worker.main"
    depends_on:
      api:
        condition: service_healthy

  scheduler:
    <<: *python-service
    command: >-
      sh -c "python -m pip install --disable-pip-version-check -r requirements.txt &&
      python -m apps.scheduler.main"
    depends_on:
      api:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    init: true
    env_file:
      - path: apps/web/.env.local
        required: false
    environment:
      API_BASE_URL: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  python_cache:
  web_node_modules:
